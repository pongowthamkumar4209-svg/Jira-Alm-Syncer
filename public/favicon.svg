<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c0000"/>
      <stop offset="100%" stop-color="#0a0000"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#cc0000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle glow overlay -->
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>
  <!-- Border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#cc0000" stroke-width="2" opacity="0.5"/>
  <!-- Inner border highlight -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#ff4444" stroke-width="0.5" opacity="0.2"/>
  <!-- P letter with glow -->
  <text 
    x="33" y="47" 
    font-family="Arial Black, Impact, sans-serif" 
    font-weight="900" 
    font-size="46" 
    text-anchor="middle" 
    fill="url(#letter)"
    filter="url(#shadow)">P</text>
</svg>